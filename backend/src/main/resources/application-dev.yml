spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:h2/schema.sql
      data-locations: classpath:h2/data.sql
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${SERVER_PORT:8080}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:excel-process}

jwt:
  secret: ${JWT_SECRET:excel-process-service-secret-key}
  expiration: ${JWT_EXPIRATION:3600}

task:
  max-concurrent: ${TASK_MAX_CONCURRENT:10}
  timeout: ${TASK_TIMEOUT:1800}
  retry-count: ${TASK_RETRY_COUNT:3}

security:
  ui-login:
    bootstrap-admin:
      username: ${UI_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${UI_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe@123}
      display-name: ${UI_BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}
  rbac:
    admin-clients: ${RBAC_ADMIN_CLIENTS:admin,admin-client}
    operator-clients: ${RBAC_OPERATOR_CLIENTS:test-client}
    viewer-clients: ${RBAC_VIEWER_CLIENTS:viewer-client}
