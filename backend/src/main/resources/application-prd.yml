spring:
  application:
    name: excel-process-service
  datasource:
    url: jdbc:mysql://localhost:3306/excel_process?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.excel.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

# MinIO配置
minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: excel-process

# JWT配置
jwt:
  secret: excel-process-service-secret-key
  expiration: 3600

# 任务处理配置
task:
  max-concurrent: 100
  timeout: 1800
  retry-count: 3

# 客户端配置
client:
  api-key-header: X-API-Key
  max-failed-attempts: 5
  rate-limit: 100

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always