spring:
  application:
    name: excel-process-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/excel_process?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.excel.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: ${SERVER_PORT:8080}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:excel-process}

jwt:
  secret: ${JWT_SECRET:excel-process-service-secret-key}
  expiration: ${JWT_EXPIRATION:3600}

task:
  max-concurrent: ${TASK_MAX_CONCURRENT:100}
  timeout: ${TASK_TIMEOUT:1800}
  retry-count: ${TASK_RETRY_COUNT:3}

client:
  api-key-header: ${API_KEY_HEADER:X-API-Key}
  max-failed-attempts: ${CLIENT_MAX_FAILED_ATTEMPTS:5}
  rate-limit: ${CLIENT_RATE_LIMIT:100}

security:
  rbac:
    admin-clients: ${RBAC_ADMIN_CLIENTS:admin-client}
    operator-clients: ${RBAC_OPERATOR_CLIENTS:test-client}
    viewer-clients: ${RBAC_VIEWER_CLIENTS:viewer-client}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
